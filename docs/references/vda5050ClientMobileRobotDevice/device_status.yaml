      height_min: 0.20
      height_max: 0.40
      width: 0.55
      length: 0.90
    protocol_limits:
      max_string_lens:
        msg_len: 65535
        id_len: 128
      max_array_lens:
        order_nodes: 50
        order_edges: 50
      timing:
        min_order_interval: 0.5
        min_state_interval: 1.0
    protocol_features:
