      header_id: 55
      timestamp: "2026-05-21T08:05:15.00Z"
      version: "2.0.0"
      manufacturer: "Reeman"
      serial_number: "AMR1"
    order_id: "order-uc1a-2026-001"
    order_update_id: 0
    last_node_id: "Storage-Pickup-Dock-01"
    last_node_sequence_id: 2
    node_states:
      - node_id: "LabAuto-Dropoff-PreDock-01"
        sequence_id: 4
        released: true
      - node_id: "LabAuto-Dropoff-Dock-01"
