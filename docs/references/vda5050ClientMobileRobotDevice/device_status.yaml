# DeviceStatus — combined snapshot of one AGV's State + Connection + Factsheet.
#
# Topic:     /<topic_namespace>/<manufacturer>/<serial_number>/device_status
# QoS:       RELIABLE + TRANSIENT_LOCAL (latched)
# Direction: master -> downstream consumers (RES, MAPF, dashboards)
#
# Published on every State/Connection/Factsheet arrival from the AGV.
# Bounded arrays (<=1) express an idiomatic ROS2 optional:
#   - empty [] = not yet received from AGV
#   - one element = current cached value
#
# Cadence: dominated by State (~1 Hz active, 30 s heartbeat).

---
# UseCase 1a: Full snapshot — AMR1-Reeman transiting on E2 with storage cart
# (pickup complete; halfway to LabAuto-Dropoff-PreDock-01 at position (7.0, 4.3))
