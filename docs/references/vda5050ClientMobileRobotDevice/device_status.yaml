      battery_voltage: 25.0
      battery_health: 98
      charging: false
      reach: 19200
    operating_mode: "AUTOMATIC"
    errors: []
    safety_state:
      e_stop: "NONE"
      field_violation: false

connection:
  - header:
      header_id: 1
      timestamp: "2026-05-21T07:59:55.00Z"
      version: "2.0.0"
      manufacturer: "Reeman"
      serial_number: "AMR1"
    connection_state: "ONLINE"

factsheet:
  - header:
      header_id: 1
      timestamp: "2026-05-21T07:59:56.00Z"
      version: "2.0.0"
      manufacturer: "Reeman"
      serial_number: "AMR1"
    type_specification:
      series_name: "Reeman AMR-Series"
      agv_kinematic: "DIFF"
      agv_class: "CARRIER"
      max_load_mass: 100.0
