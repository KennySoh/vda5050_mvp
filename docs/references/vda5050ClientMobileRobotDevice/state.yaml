# Topic (ROS2): /<topic_namespace>/<manufacturer>/<serial_number>/state
# Direction:   AGV -> MQTT broker -> master
#
# operating_mode: AUTOMATIC | SEMIAUTOMATIC | MANUAL | SERVICE | TEACHIN
# e_stop values:  AUTOACK | MANUAL | REMOTE | NONE

