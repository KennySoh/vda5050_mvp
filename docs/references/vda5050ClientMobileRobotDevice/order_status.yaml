# OrderStatus — per-AGV order execution lifecycle, published by the master.
#
# Topic:     /<topic_namespace>/<manufacturer>/<serial_number>/order_status
# QoS:       RELIABLE + TRANSIENT_LOCAL (latched)
# Direction: master -> downstream consumers (RES, MAPF, dashboards)
#
# Published on every State arrival. Also available via GetOrderStatus service.
#
# phase values:
#   0 = PHASE_NO_ORDER  — AGV onboarded, no active order
#   1 = PHASE_ACCEPTED  — order published; AGV not yet at first node
#   2 = PHASE_RUNNING   — AGV traversing nodes/executing actions
#   3 = PHASE_COMPLETED — AGV reached final base node
#   4 = PHASE_FAILED    — FATAL error in State.errors[]
#
# assignment_id: echoed from AssignOrderRequest; empty if order arrived via
#                synchronous AssignOrder service (not correlation-aware in V0)

