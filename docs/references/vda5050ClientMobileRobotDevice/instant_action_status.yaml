# InstantActionStatus — AGV-reported status of instant actions via State.action_states[].
#
# This is not a standalone MQTT/ROS2 message — instant action results are embedded
# in the regular State message under action_states[]. This file shows the relevant
# portion of State for instant action tracking.
#
# Source: State.action_states[] filtered to entries from InstantActions dispatches.
# Direction: AGV -> MQTT broker -> master (as part of State message)
#
# action_status values:
#   WAITING      — instant action received but not yet triggered
#   INITIALIZING — preparatory measures underway
#   RUNNING      — action executing
#   PAUSED       — action paused (e.g., by another pauseOrder)
#   FINISHED     — action completed; see result_description
#   FAILED       — action could not complete; error in State.errors[]

---
# UseCase 1a: pauseOrder — AMR1-Reeman decelerating to stop on E1 (obstacle detected)
manufacturer: "Reeman"
serial_number: "AMR1"
timestamp: "2026-05-21T08:01:21.50Z"

action_states:
  - action_id: "ia-pause-001"
    action_type: "pauseOrder"
    action_status: "RUNNING"
    action_description: "Pausing order — obstacle on E1 approach to Storage-Pickup-Dock-01"
    result_description: ""

---
# Example 2: pauseOrder — AMR1-Reeman fully stopped at (2.0, 4.3) on E1
manufacturer: "Reeman"
serial_number: "AMR1"
timestamp: "2026-05-21T08:01:22.80Z"

action_states:
  - action_id: "ia-pause-001"
    action_type: "pauseOrder"
    action_status: "FINISHED"
    action_description: "Pausing order — obstacle on E1"
    result_description: "AMR1 paused at (2.0, 4.3, theta=-1.5708)"

---
# Example 3: resumeOrder — AMR1-Reeman order restored after obstacle cleared
manufacturer: "Reeman"
serial_number: "AMR1"
timestamp: "2026-05-21T08:01:46.20Z"

action_states:
  - action_id: "ia-pause-001"
    action_type: "pauseOrder"
    action_status: "FINISHED"
    result_description: "AMR1 paused at (2.0, 4.3, theta=-1.5708)"

  - action_id: "ia-resume-001"
    action_type: "resumeOrder"
    action_status: "FINISHED"
    action_description: "Resuming order — obstacle cleared on E1"
    result_description: "Order resumed, continuing toward Storage-Pickup-Dock-01"

---
# Example 4: startCharging failed — AMR1-Reeman not fully docked at charging contact
manufacturer: "Reeman"
serial_number: "AMR1"
timestamp: "2026-05-21T08:10:01.00Z"

action_states:
  - action_id: "ia-charge-001"
    action_type: "startCharging"
    action_status: "FAILED"
    action_description: "Initiate contact charging at Reeman-ChargingPoint-01"
    result_description: "No charging contact detected — AMR1 not fully docked at charging station"
